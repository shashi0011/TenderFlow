{% load static %}
<!doctype html>
<html lang="en">

    <head>
        <meta charset="utf-8" />
        <title>Vendor Register | RFP System</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="shortcut icon" href="/static/assets/images/favicon.ico">
        <link href="/static/assets/css/bootstrap.min.css" id="bootstrap-style" rel="stylesheet" type="text/css" />
        <link href="/static/assets/css/icons.min.css" rel="stylesheet" type="text/css" />
        <link href="/static/assets/css/app.min.css" id="app-style" rel="stylesheet" type="text/css" />
    </head>

    <body>
        <div class="home-btn d-none d-sm-block">
            <a href="{% url 'login' %}" class="text-dark"><i class="fas fa-home h2"></i></a>
        </div>
        <div class="account-pages my-5 pt-sm-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-md-10 col-lg-8 col-xl-7">
                        <div class="card overflow-hidden">
                            <div class="bg-soft-primary">
                                <div class="row">
                                    <div class="col-12">
                                        <div class="text-primary p-4">
                                            <h5 class="text-primary">Welcome to RFP System!</h5>
                                            <p>Sign up to continue</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {% if messages %}
                                {% for message in messages %}
                                    <div class="alert alert-{{ message.tags|default:'info' }}">
                                        {{ message }}
                                    </div>
                                {% endfor %}
                            {% endif %}

                            <div class="card-body pt-0">
                                <div class="p-4">
                                    <form method="POST">
                                        {% csrf_token %}

                                        <div class="row">
                                            <div class="col-md-6">
                                                <div class="form-group">
                                                    <label>First name<span class="text-danger">*</span></label>
                                                    <input type="text" class="form-control" name="first_name" placeholder="Enter Firstname" required>
                                                </div>
                                            </div>
                                            <div class="col-md-6">
                                                <div class="form-group">
                                                    <label>Last Name<span class="text-danger">*</span></label>
                                                    <input type="text" class="form-control" name="last_name" placeholder="Enter Lastname" required>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="form-group">
                                            <label>Email<span class="text-danger">*</span></label>
                                            <input type="email" class="form-control" name="email" placeholder="Enter Email" required>
                                        </div>

                                        <div class="row">
                                            <div class="col-md-6">
                                                <div class="form-group">
                                                    <label>Password<span class="text-danger">*</span></label>
                                                    <input type="password" class="form-control" name="password" placeholder="Enter Password" required>
                                                </div>
                                            </div>
                                            <div class="col-md-6">
                                                <div class="form-group">
                                                    <label>Confirm Password<span class="text-danger">*</span></label>
                                                    <input type="password" class="form-control" name="confirm_password" placeholder="Enter Confirm Password" required>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="row">
                                            <div class="col-md-6">
                                                <div class="form-group">
                                                    <label>Company Name<span class="text-danger">*</span></label>
                                                    <input type="text" class="form-control" name="company_name" placeholder="Enter Company Name" required>
                                                </div>
                                            </div>
                                            <div class="col-md-6">
                                                <div class="form-group">
                                                    <label>Revenue (Last 3 Years in Lacks)<span class="text-danger">*</span></label>
                                                    <input type="text" class="form-control" name="annual_revenue" placeholder="Enter Revenue" required>
                                                </div>
                                            </div>
                                            <div class="col-md-6">
                                                <div class="form-group">
                                                    <label>No of Employees<span class="text-danger">*</span></label>
                                                    <input type="text" class="form-control" name="no_of_employees" placeholder="No of Employees" required>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="row">
                                            <div class="col-md-6">
                                                <div class="form-group">
                                                    <label>GST No<span class="text-danger">*</span></label>
                                                    <input type="text" class="form-control" name="gst_number" placeholder="Enter GST No" required>
                                                </div>
                                            </div>
                                            <div class="col-md-6">
                                                <div class="form-group">
                                                    <label>PAN No<span class="text-danger">*</span></label>
                                                    <input type="text" class="form-control" name="pan_number" placeholder="Enter PAN No" required>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="row">
                                            <div class="col-md-6">
                                                <div class="form-group">
                                                    <label>Phone No<span class="text-danger">*</span></label>
                                                    <input type="text" class="form-control" name="phone" placeholder="Enter Phone No" required>
                                                </div>
                                            </div>
                                            <div class="col-md-6">
                                                <div class="form-group">
                                                    <label>Categories<span class="text-danger">*</span></label>
                                                    <select class="form-control" name="categories" multiple size="6">
                                                        <option disabled>All Categories</option>
                                                        {% for category in categories %}
                                                            <option value="{{ category.id }}">{{ category.name }}</option>
                                                        {% endfor %}
                                                    </select>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="mt-3">
                                            <button class="btn btn-primary btn-block waves-effect waves-light" type="submit">Register</button>
                                        </div>

                                        <div class="mt-4 text-center">
                                            <a href="{% url 'login' %}" class="text-muted"><i class="mdi mdi-lock mr-1"></i> Back to Login</a>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                        <div class="mt-5 text-center">
                            <p>&copy; Copyright <i class="mdi mdi-heart text-danger"></i> RFP System</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
